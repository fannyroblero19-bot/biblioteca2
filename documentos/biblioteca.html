<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Biblioteca Pública</title>
  <link rel="stylesheet" href="style.css" />
  <script defer src="biblioteca.js"></script>
</head>
<body>
  <div class="layout-root" style="grid-template-columns: 1fr;">
    <main class="main-panel" style="padding:32px;">
      <header style="display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:20px;">
        <div>
          <h2>Biblioteca Pública</h2>
          <p>Explora los libros disponibles y regístrate como miembro.</p>
        </div>
        <nav>
          <a href="index.html" style="color:var(--text-muted);">Ir al Panel</a>
        </nav>
      </header>

      <section style="display:grid;grid-template-columns: 1fr 320px;gap:24px;align-items:start;">
        <div>
          <div style="margin-bottom:12px;display:flex;gap:12px;align-items:center;">
            <input id="book-search" placeholder="Buscar libros por título o autor" style="width:100%;padding:12px;border-radius:12px;border:1px solid var(--border);background:transparent;color:var(--text-main);" />
            <select id="book-filter" style="padding:12px;border-radius:12px;border:1px solid var(--border);background:transparent;color:var(--text-main);">
              <option value="all">Todos</option>
              <option value="Disponible">Disponible</option>
              <option value="Prestado">Prestado</option>
            </select>
          </div>

          <div id="public-books" class="table-frame" style="padding:16px;">
            <p class="placeholder">Cargando libros...</p>
          </div>
        </div>

        <aside style="position:relative;">
          <div class="workspace-card">
            <div class="workspace-title">
              <h3>Registro de miembro</h3>
            </div>
            <form id="register-form" style="margin-top:12px;">
              <div class="field-row">
                <label for="reg-name">Nombre</label>
                <input id="reg-name" type="text" required />
              </div>
              <div class="field-row">
                <label for="reg-email">Email</label>
                <input id="reg-email" type="email" required />
              </div>
              <div class="field-row">
                <label for="reg-role">Rol</label>
                <select id="reg-role">
                  <option value="Miembro">Miembro</option>
                </select>
              </div>
              <button class="save-btn" type="submit">Registrarme</button>
            </form>
            <div id="reg-feedback" style="margin-top:12px;color:var(--text-muted);"></div>
          </div>
        </aside>
      </section>
    </main>
  </div>
</body>
</html>
